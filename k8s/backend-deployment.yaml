apiVersion: apps/v1
kind: Deployment
metadata:
  name: nba-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nba-backend
  template:
    metadata:
      labels:
        app: nba-backend
    spec:
      containers:
        - name: backend
          image: nba-ai-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nba-secrets
                  key: openai
